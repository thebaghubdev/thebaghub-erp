<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guide on taking photos of your items — The Bag Hub</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: #faf8f5;
        color: #5c4033;
        font-family: Georgia, "Times New Roman", serif;
        line-height: 1.45;
      }
      .wrap {
        max-width: 56rem;
        margin: 0 auto;
        padding: 1.5rem 1rem 3rem;
      }
      header {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 1.25rem;
        padding-bottom: 1.25rem;
        border-bottom: 1px solid #d4c4b0;
        margin-bottom: 1.75rem;
        font-size: 0.8125rem;
      }
      .brand {
        font-size: 1.375rem;
        letter-spacing: 0.06em;
        font-weight: 600;
        margin-bottom: 0.35rem;
      }
      header a {
        color: #5c4033;
      }
      h1 {
        text-align: center;
        font-size: clamp(0.95rem, 2.8vw, 1.2rem);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin: 0 0 1.75rem;
        font-weight: 700;
      }
      .guides {
        display: flex;
        flex-direction: column;
        gap: 2rem;
      }
      .guides img {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 4px;
        box-shadow: 0 4px 28px rgba(0, 0, 0, 0.09);
      }
      footer {
        margin-top: 2.25rem;
        padding-top: 1.25rem;
        border-top: 1px solid #d4c4b0;
        font-size: 0.8125rem;
        text-align: center;
        max-width: 40rem;
        margin-left: auto;
        margin-right: auto;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div>
          <div class="brand">THE BAG HUB</div>
          <div>
            The Grove Retail Row, 201 2nd Floor, E. Rodriguez Jr., Ave. Pasig
            City
          </div>
        </div>
        <div>
          <div>Tel: +63 917 838 6242</div>
          <div>
            <a href="mailto:thebaghubph@gmail.com">thebaghubph@gmail.com</a>
          </div>
        </div>
      </header>

      <h1>Guide on taking photos of your items</h1>

      <div class="guides">
        <img
          src="/photo-guide/guide-01.png"
          alt="Photo guide: bags — angles and details to capture"
          loading="lazy"
          decoding="async"
        />
        <img
          src="/photo-guide/guide-02.png"
          alt="Photo guide: bags — close-ups and hardware"
          loading="lazy"
          decoding="async"
        />
        <img
          src="/photo-guide/guide-03.png"
          alt="Photo guide: shoes — angles to photograph"
          loading="lazy"
          decoding="async"
        />
        <img
          src="/photo-guide/guide-04.png"
          alt="Photo guide: shoes — details and condition"
          loading="lazy"
          decoding="async"
        />
        <img
          src="/photo-guide/guide-05.png"
          alt="Photo guide: accessories and jewelry"
          loading="lazy"
          decoding="async"
        />
      </div>

      <footer>
        <p>
          Please state the flaws that cannot be captured in photos such as, but
          not limited to moldy smell and loose clasp.
        </p>
      </footer>
    </div>
  </body>
</html>
